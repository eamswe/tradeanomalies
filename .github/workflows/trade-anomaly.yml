name: Monthly trade-anomaly monitor

# Runs at 10:01 Irish time on the 16th of each month.
#
# GitHub Actions cron is UTC and ignores DST, so we use TWO cron entries — one
# for Irish Summer Time (UTC+1) and one for winter/GMT (UTC+0) — and a small
# "gate" job lets only the entry that actually lands at 10:0x Europe/Dublin run.
# That keeps it at 10:01 Irish year-round. (Scheduled runs can be delayed a few
# minutes under GitHub load; the gate checks the hour so a small delay is fine.)
#
# NOTE: scheduled workflows only run from the default branch (main), and GitHub
# auto-disables a schedule after 60 days with no commits — the monthly state
# commit in the last step keeps it alive.

on:
  schedule:
    - cron: "1 9 16 * *"     # 09:01 UTC = 10:01 Irish during IST (summer)
    - cron: "1 10 16 * *"    # 10:01 UTC = 10:01 Irish during GMT (winter)
  workflow_dispatch: {}       # manual run button (Actions tab)

permissions:
  contents: write             # needed so the job can commit the state file back

jobs:
  # Let only the season-correct cron through (and always allow manual runs).
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          dub_hour=$(TZ=Europe/Dublin date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$dub_hour" = "10" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Dublin hour is $dub_hour, not the 10:01 Irish slot — skipping this trigger."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  run:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # ubuntu-latest ships curl, so the script's data fetch works as-is.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true        # binary packages = fast install

      - name: Install R packages
        # Not cached on purpose: monthly runs are >7 days apart and the Actions
        # cache evicts after 7 days, so a cache would never hit. RSPM binaries
        # install these in well under two minutes.
        run: Rscript -e 'install.packages(c("jsonlite","dplyr","ggplot2"))'

      - name: Generate the report (HTML + chart PNGs + CSV)
        run: Rscript trade_anomaly_monthly.R

      - name: Build the subject line
        id: meta
        run: echo "month=$(date +'%B %Y')" >> "$GITHUB_OUTPUT"

      - name: Email the report
        # send_email.py attaches the cid: charts inline (Content-ID), so the
        # per-category mini charts render in Gmail and Outlook. python3 + the
        # email/smtplib stdlib ship on ubuntu-latest, so no install is needed.
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DFIN_MAIL_TO:  ${{ secrets.DFIN_MAIL_TO }}
          MAIL_SUBJECT:  "Trade Anomaly Monitor — ${{ steps.meta.outputs.month }}"
        run: python3 send_email.py

      - name: Persist NEW-vs-ongoing state
        run: |
          git config user.name  "trade-anomaly-bot"
          git config user.email "actions@users.noreply.github.com"
          git add trade_anomaly_state.csv trade_anomaly_monthly.csv
          git commit -m "anomaly state ${{ steps.meta.outputs.month }}" || echo "no changes to commit"
          git push
